name: Version Release

on:
  push:
    tags:
      - '[0-9]*.[0-9]*.[0-9]*' # Matches stable (1.0.0) and pre-release (1.0.0rc0, 1.0.0a1, 1.0.0b2)

jobs:
  run-tests:
    name: Trigger tests.yml
    uses: ./.github/workflows/tests.yml

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: run-tests
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: ${{ github.ref }}
          draft: false
          prerelease: false

  pypi-release:
    name: Publish on PyPi
    runs-on: ubuntu-latest
    needs: github-release
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      # Make sure the version in pyproject.toml and hezar/__init__.py match the tag
      - name: Get version from pyproject.toml
        id: get_version
        run: |
          pyproject_version=$(python -c "import re; version = re.search(r'version = \"(.+?)\"', open('pyproject.toml').read()).group(1); print(version)")
          echo "pyproject_version=$pyproject_version" >> $GITHUB_ENV
          init_git_version=$(python -c "import re; version = re.search(r'__version__ = \"(.+?)\"', open('hezar/__init__.py').read()).group(1); print(version)")
          echo "init_git_version=$init_git_version" >> $GITHUB_ENV

      - name: Extract Git tag
        run: |
          GIT_TAG=${GITHUB_REF##*/}
          echo "GIT_TAG=$GIT_TAG" >> $GITHUB_ENV

      - name: Check if versions match
        run: |
          if [[ ${{ env.pyproject_version }} != "${{ env.GIT_TAG }}" ]]; then
            echo "[Error]: Version Mismatch!"
            exit 1
          fi
          if [[ ${{ env.GIT_TAG }} != "${{ env.init_git_version }}" ]]; then
            echo "[Error]: Version Mismatch!"
            exit 1
          fi

      - name: Build package
        run: uv build

      - name: Publish package to PyPI
        run: uv publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}

  call-docs-workflow:
    name: Trigger docs-deploy.yml
    uses: ./.github/workflows/docs-deploy.yml
    needs:
      - pypi-release
